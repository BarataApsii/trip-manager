{% extends "base.html" %}

{% block title %}Delete Customer - Trip Manager{% endblock %}

{% block content %}
<h2 class="mb-4">Delete Customer</h2>

<div class="card">
    <div class="card-body">
        <p>Are you sure you want to delete <strong>{{ customer.full_name }}</strong>?</p>
        <p class="text-danger">This will also delete all associated bookings and payments.</p>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">Delete</button>
                <a href="{% url 'customers:customer_detail' customer.pk %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
