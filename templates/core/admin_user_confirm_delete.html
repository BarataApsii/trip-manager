{% extends "base.html" %}

{% block title %}Delete User - Trip Manager{% endblock %}

{% block content %}
<h2 class="mb-4">Delete User</h2>

<div class="card">
    <div class="card-body">
        <p>Are you sure you want to delete user <strong>{{ user_obj.username }}</strong>?</p>
        <p class="text-danger">This action cannot be undone.</p>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">Delete</button>
                <a href="{% url 'core:admin_panel' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
